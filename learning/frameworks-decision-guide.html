    <div class="header-actions">
      <a class="header-back" href="./" title="Back to Learning Hub">

  <main id="main" class="learning-main">
    <div class="guide-page">
      <p id="guideStatus" class="guide-status">Loading guide…</p>
      <article id="guideRoot" class="md-article" hidden></article>
      <p id="guideError" class="guide-error" hidden></p>
      <p class="guide-source-note">
        <a href="./frameworks-decision-guide.md" download>Download Markdown source</a>
      </p>
    </div>
  </main>

  <footer class="info-footer">
    Part of <a class="footer-link" href="https://neorgon.com/">Neorgon</a>
  </footer>

  <script type="module">
    const status = document.getElementById('guideStatus');
    const root = document.getElementById('guideRoot');
    const err = document.getElementById('guideError');

    try {
      const res = await fetch('./frameworks-decision-guide.md', { cache: 'no-cache' });
      if (!res.ok) throw new Error('Could not load guide file');
      const text = await res.text();
      const { marked } = await import('https://esm.sh/marked@12.0.0');
      root.innerHTML = marked.parse(text);
      root.hidden = false;
      status.hidden = true;
    } catch (e) {
      status.hidden = true;
      err.hidden = false;
      err.textContent = 'This page needs to be served over HTTP (fetch the Markdown guide). Run make serve from anatomy-site, then open this URL from localhost.';
    }
  </script>
